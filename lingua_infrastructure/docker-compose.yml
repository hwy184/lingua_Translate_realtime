services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server 
    command: --config /livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    networks:
      - lingua-network

networks:
  lingua-network:
    driver: bridge